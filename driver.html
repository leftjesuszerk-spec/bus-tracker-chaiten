<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - Bus Chaitén</title>
    
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/driver.css">
</head>
<body>
    <div id="driver-app">
        <!-- Pantalla de inicio - Designarse como conductor -->
        <div id="start-screen" class="screen active">
            <div class="start-container">
                <div class="start-icon">🚌</div>
                <h1>CONDUCTOR</h1>
                <p>Bus Chaitén - Ronda Municipal</p>
                
                <button class="start-btn" onclick="driverApp.startDriving()">
                    INICIAR COMO CONDUCTOR
                </button>
                
                <p class="start-note">
                    Al presionar, comenzarás a compartir la ubicación del bus en tiempo real.
                </p>
            </div>
        </div>
        
        <!-- Pantalla principal conductor -->
        <div id="driver-main" class="screen">
            <div class="driver-header">
                <div class="driver-info">
                    <span class="driver-status connected">● EN LÍNEA</span>
                </div>
                <button class="stop-btn" onclick="driverApp.stopDriving()">
                    DETENER
                </button>
            </div>
            
            <div class="driver-map" id="driver-map"></div>
            
            <div class="driver-controls">
                <div id="gps-status" class="status-box stopped">
                    <div class="status-icon">📍</div>
                    <div class="status-text">GPS DETENIDO</div>
                    <div class="status-detail">Presiona iniciar</div>
                </div>
                
                <button id="toggle-gps" class="action-btn start" onclick="driverApp.toggleGPS()">
                    SINCRONIZAR UBICACIÓN
                </button>
                
                <div class="location-info">
                    <span id="current-lat">--.-----</span>
                    <span class="separator">|</span>
                    <span id="current-lng">--.-----</span>
                    <span class="time" id="current-time">--:--:--</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/driver.js"></script>
</body>
</html>
