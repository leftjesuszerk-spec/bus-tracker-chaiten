<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Chaitén</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0066cc">
    <meta name="description" content="Rastreo en vivo del bus municipal de Chaitén">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
    <div id="app">
        <!-- PANTALLA DE PASAJERO - SOLO MAPA -->
        <div id="map-screen" class="screen active">
            <div id="map-container">
                <div id="map"></div>
                
                <!-- Header flotante -->
                <div class="floating-header">
                    <h1>🚌 Bus Chaitén</h1>
                    <div class="connection-status" id="connection-status">🟢</div>
                </div>
                
                <!-- Info del bus flotante -->
                <div id="bus-info-overlay" class="info-overlay">
                    <div class="bus-status">
                        <div class="bus-icon">🚌</div>
                        <div class="bus-details">
                            <div class="bus-status-text" id="bus-status-text">Buscando bus...</div>
                            <div class="bus-last-update" id="bus-last-update">-</div>
                        </div>
                    </div>
                </div>
                
                <!-- Botón centrar -->
                <button class="center-btn" onclick="app.centerOnBus()" title="Centrar">
                    🎯
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/passenger.js"></script>
    
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registrado'))
                .catch(err => console.log('Error:', err));
        }
    </script>
</body>
</html>
