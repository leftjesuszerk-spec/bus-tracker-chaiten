<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Chaitén</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0066cc">
    <meta name="description" content="Rastreo en vivo del bus municipal de Chaitén">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
    <div id="app">
        <!-- MAPA PRINCIPAL - Se muestra directamente -->
        <div id="map-screen" class="screen active">
            <div id="map-container">
                <div id="map"></div>
                
                <!-- Header flotante -->
                <div class="floating-header">
                    <h1>🚌 Bus Chaitén</h1>
                    <div class="connection-status" id="connection-status">🟢</div>
                </div>
                
                <!-- Info del bus flotante -->
                <div id="bus-info-overlay" class="info-overlay">
                    <div class="bus-status">
                        <div class="bus-icon">🚌</div>
                        <div class="bus-details">
                            <div class="bus-status-text" id="bus-status-text">Buscando bus...</div>
                            <div class="bus-last-update" id="bus-last-update">-</div>
                        </div>
                    </div>
                </div>
                
                <!-- Botones de control -->
                <button class="center-btn" onclick="app.centerOnBus()" title="Centrar">
                    🎯
                </button>
                
                <button class="driver-access-btn" onclick="app.showDriverModal()" title="Modo Conductor">
                    ⚙️
                </button>
            </div>
        </div>

        <!-- Modal para acceso conductor -->
        <div id="driver-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Modo Conductor</h2>
                    <button class="close-btn" onclick="app.hideDriverModal()">×</button>
                </div>
                <div class="modal-body">
                    <p>Esto iniciará el GPS para compartir la ubicación del bus.</p>
                    <button class="action-btn driver-enter" onclick="app.enterDriverMode()">
                        Ingresar como Conductor
                    </button>
                </div>
            </div>
        </div>

        <!-- Pantalla del conductor (full screen) -->
        <div id="driver-screen" class="screen">
            <div class="driver-fullscreen">
                <div class="driver-header">
                    <h2>🚌 Modo Conductor</h2>
                    <button class="close-btn" onclick="app.exitDriverMode()">×</button>
                </div>
                
                <div class="driver-map-preview" id="driver-map-preview"></div>
                
                <div class="driver-controls">
                    <div id="driver-status" class="status-box stopped">
                        <div class="status-icon">📍</div>
                        <div class="status-text">GPS Detenido</div>
                        <div class="status-detail">Presiona iniciar</div>
                    </div>
                    
                    <button id="toggle-gps-btn" class="action-btn start" onclick="app.toggleGPS()">
                        Iniciar GPS
                    </button>
                    
                    <div class="driver-info-simple">
                        <span id="driver-lat">-</span>, <span id="driver-lng">-</span>
                    </div>
                    
                    <div class="battery-warning">
                        ⚠️ Mantén la app abierta. Consume batería.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registrado'))
                .catch(err => console.log('Error registrando Service Worker:', err));
        }
    </script>
</body>
</html>
