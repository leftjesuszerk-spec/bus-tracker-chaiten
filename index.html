<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Chaitén</title>
    
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
    <div id="app">
        <div id="map-container">
            <div id="map"></div>
            
            <!-- Status pill top right -->
            <div class="status-pill" id="connection-status">
                <span class="status-dot"></span>
                <span class="status-text">Conectando...</span>
            </div>
            
            <!-- Left Sidebar - Status + Schedule -->
            <div class="sidebar" id="sidebar">
                <!-- Bus Status (sin emoji duplicado) -->
                <div class="bus-status-sidebar">
                    <div class="bus-info">
                        <div class="bus-status-text" id="bus-status-text">Buscando...</div>
                        <div class="bus-last-update" id="bus-last-update">-</div>
                    </div>
                </div>
                
                <!-- Divider -->
                <div class="sidebar-divider"></div>
                
                <!-- Schedule -->
                <div class="schedule-section">
                    <div class="schedule-title">HORARIOS</div>
                    <div class="schedule-subtitle">LUNES A VIERNES - RUTA COMPLETA</div>
                    
                    <div class="schedule-times">
                        07:30 • 08:30 • 10:30 • 13:00 • 16:30 • 18:00 • 19:30
                    </div>
                </div>
            </div>
            
            <!-- Follow button -->
            <button class="follow-btn" onclick="app.centerOnBus()" id="follow-btn" title="Seguir bus">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.54 5.82 22l-5-4.87 6.91-3.09L12 9l-3.09-6.26L2 9.27l5-4.87z"/>
                </svg>
                <span class="follow-text">SEGUIR</span>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/passenger.js"></script>
</body>
</html>
