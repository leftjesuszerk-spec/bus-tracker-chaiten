<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Chaitén</title>
    
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
    <div id="app">
        <div id="map-container">
            <div id="map"></div>
            
            <!-- Status pill top right -->
            <div class="status-pill" id="connection-status">
                <span class="status-dot"></span>
                <span class="status-text">Conectando...</span>
            </div>
            
            <!-- Left Sidebar - Status + Schedule -->
            <div class="sidebar" id="sidebar">
                <!-- Bus Status -->
                <div class="bus-status-sidebar">
                    <div class="bus-icon">🚌</div>
                    <div class="bus-info">
                        <div class="bus-status-text" id="bus-status-text">Buscando...</div>
                        <div class="bus-last-update" id="bus-last-update">-</div>
                    </div>
                </div>
                
                <!-- Divider -->
                <div class="sidebar-divider"></div>
                
                <!-- Schedule -->
                <div class="schedule-section">
                    <div class="schedule-title">HORARIOS</div>
                    <div class="schedule-subtitle">LUNES A VIERNES</div>
                    
                    <div class="route-info">
                        <span class="route-arrow">↑</span> NORTE
                    </div>
                    <div class="schedule-times">
                        07:30 • 08:30 • 10:30 • 13:00 • 16:30 • 18:00 • 19:30
                    </div>
                    
                    <div class="route-info">
                        <span class="route-arrow">↓</span> SUR
                    </div>
                    <div class="schedule-times">
                        07:30 • 08:30 • 10:30 • 13:00 • 16:30 • 18:00 • 19:30
                    </div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="map-controls">
                <button class="control-btn zoom-in" onclick="app.zoomIn()">+</button>
                <button class="control-btn zoom-out" onclick="app.zoomOut()">−</button>
            </div>
            
            <!-- Center button -->
            <button class="center-btn" onclick="app.centerOnBus()" id="center-btn" title="Centrar en bus">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/passenger.js"></script>
</body>
</html>
